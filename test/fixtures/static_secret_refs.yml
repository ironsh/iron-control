github_token_inject:
  namespace: acme
  name: github-token
  description: GitHub PAT injected as a bearer token
  labels:
    team: platform
  inject_config:
    header: Authorization
    formatter: "Bearer {{ .Value }}"

db_password_replace:
  namespace: acme
  name: db_password
  description: Database password swapped in for the placeholder
  labels: {}
  replace_config:
    proxy_value: __DB_PASSWORD__
    match_headers:
      - Authorization
    match_body: true
    require: true
