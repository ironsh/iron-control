# The rotating token blob (access_token/refresh_token) is encrypted and is set in
# test setup via the model, not here -- encrypt_fixtures is off, so these
# fixtures carry only operator-authored config and sit in "bootstrapping" status.
# Input sources live in secret_sources.yml.
acme_managed_gmail:
  namespace: acme
  foreign_id: managed-gmail
  name: managed-gmail
  labels:
    team: comms
  token_endpoint: https://oauth2.googleapis.com/token
  scopes:
    - https://www.googleapis.com/auth/gmail.readonly
  created_by: acme_admin

globex_managed_api:
  namespace: globex
  foreign_id: managed-api
  name: managed-api
  token_endpoint: https://idp.globex.example/oauth/token
  created_by: globex_admin
