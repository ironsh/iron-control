{{- if not .Values.secrets.existingSecret }}
{{- $v := .Values.secrets.values }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iron-control.fullname" . }}
  labels:
    {{- include "iron-control.labels" . | nindent 4 }}
  annotations:
    # Hook-annotated so it exists before the pre-install migration Job runs.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  RAILS_MASTER_KEY: {{ required "secrets.values.railsMasterKey is required when secrets.existingSecret is unset" $v.railsMasterKey | quote }}
  IRON_CONTROL_DATABASE_PASSWORD: {{ required "secrets.values.databasePassword is required when secrets.existingSecret is unset" $v.databasePassword | quote }}
  IRON_CONTROL_AR_ENCRYPTION_PRIMARY_KEY: {{ required "secrets.values.arEncryptionPrimaryKey is required when secrets.existingSecret is unset" $v.arEncryptionPrimaryKey | quote }}
  IRON_CONTROL_AR_ENCRYPTION_DETERMINISTIC_KEY: {{ required "secrets.values.arEncryptionDeterministicKey is required when secrets.existingSecret is unset" $v.arEncryptionDeterministicKey | quote }}
  IRON_CONTROL_AR_ENCRYPTION_KEY_DERIVATION_SALT: {{ required "secrets.values.arEncryptionKeyDerivationSalt is required when secrets.existingSecret is unset" $v.arEncryptionKeyDerivationSalt | quote }}
  {{- with .Values.bootstrap.initialUserEmail }}
  IRON_CONTROL_INITIAL_USER_EMAIL: {{ . | quote }}
  {{- end }}
  {{- with .Values.bootstrap.initialUserPassword }}
  IRON_CONTROL_INITIAL_USER_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.bootstrap.initialApiKey }}
  IRON_CONTROL_INITIAL_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
